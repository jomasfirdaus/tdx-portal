{% if page_obj.paginator.num_pages > 1 %}
<nav class="pagination" aria-label="Pagination">
  {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}">&larr;</a>
  {% endif %}
  {% for num in page_obj.paginator.page_range %}
    {% if num == page_obj.number %}
      <span class="current">{{ num }}</span>
    {% else %}
      <a href="?page={{ num }}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}">{{ num }}</a>
    {% endif %}
  {% endfor %}
  {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}">&rarr;</a>
  {% endif %}
</nav>
{% endif %}
