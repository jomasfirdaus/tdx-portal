{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login — TDx Dashboard</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand"><span class="brand-mark">TDx</span></div>
    <p class="auth-sub">Sign in to the TDx staff dashboard</p>

    {% if messages %}
      {% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>{% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="field-group">
        <label class="field-label" for="{{ form.username.id_for_label }}">Username</label>
        {{ form.username }}
      </div>
      <div class="field-group">
        <label class="field-label" for="{{ form.password.id_for_label }}">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:22px;"><a href="{% url 'core:home' %}">&larr; Back to website</a></p>
  </div>
</div>
</body>
</html>
